<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-Nilai Praktik Mupa</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<h1>e-Nilai Praktik Mupa</h1>
<p>SMK Muhammadiyah Pakem</p>

<div id="loginBox" class="card">

<h3>Login Admin</h3>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="loginMsg"></p>

</div>

<div id="menuBox" class="card hidden">

<h3>Menu</h3>

<p id="welcome"></p>

<button onclick="showInput()">Input Nilai</button>

<button onclick="logout()">Logout</button>

</div>

<div id="inputBox" class="card hidden">

<h3>Input Nilai</h3>

<p>Form input nilai akan kita sambungkan ke Apps Script pada tahap berikutnya.</p>

</div>

<script src="js/app.js"></script>

</body>
</html>
